<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Playlist Link Extractor | 影片清單連結擷取工具</title>
  <meta name="description" content="輕鬆貼上 YouTube 播放清單網址，快速擷取所有影片標題與連結，支援自訂選取、多種複製格式（純文字、Markdown 等），工程師與內容創作者的必備神器。">
  <!-- Google Fonts: Outfit & Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Animated glow background elements -->
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <div class="bg-glow bg-glow-3"></div>

  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="logo-area">
        <div class="logo-icon">
          <i data-lucide="youtube"></i>
        </div>
        <h1>YT Playlist Linker</h1>
      </div>
      <p class="subtitle">貼上播放清單連結，一鍵快速擷取與複製影片資訊</p>
    </header>

    <!-- Main Card -->
    <main class="main-card">
      <!-- Input Section -->
      <section class="input-section">
        <form id="playlist-form" class="input-form">
          <div class="input-group">
            <i data-lucide="link-2" class="input-icon"></i>
            <input 
              type="text" 
              id="playlist-url" 
              placeholder="請貼上 YouTube 播放清單網址 (例如：https://www.youtube.com/playlist?list=...)" 
              required
              autocomplete="off"
            >
            <button type="submit" id="submit-btn" class="primary-btn">
              <span>擷取清單</span>
              <i data-lucide="arrow-right"></i>
            </button>
          </div>
        </form>
        <div id="error-message" class="error-box hidden">
          <i data-lucide="alert-circle"></i>
          <span class="error-text"></span>
        </div>
      </section>

      <!-- Loading State -->
      <section id="loading-state" class="loading-state hidden">
        <div class="loader-spinner"></div>
        <p>正在分析播放清單，請稍候...</p>
      </section>

      <!-- App Interface Layout (Hidden by default, shown when data is loaded) -->
      <section id="app-workspace" class="app-workspace hidden">
        <div class="workspace-layout">
          
          <!-- Sidebar: Playlist Metadata -->
          <aside class="playlist-sidebar">
            <div class="glass-subcard playlist-info-card">
              <div class="playlist-thumbnail-wrapper">
                <img id="playlist-thumbnail" src="" alt="Playlist Cover" class="playlist-thumbnail">
                <div class="video-count-badge">
                  <i data-lucide="play-circle"></i>
                  <span id="playlist-badge-count">0</span> 部影片
                </div>
              </div>
              <h2 id="playlist-title" class="playlist-title">載入中...</h2>
              
              <div class="playlist-meta-details">
                <div class="meta-item">
                  <i data-lucide="user"></i>
                  <div>
                    <span class="meta-label">建立者</span>
                    <span id="playlist-author" class="meta-val">-</span>
                  </div>
                </div>
                <div class="meta-item">
                  <i data-lucide="hash"></i>
                  <div>
                    <span class="meta-label">總影片數</span>
                    <span id="playlist-video-count" class="meta-val">0</span>
                  </div>
                </div>
                <div class="meta-item">
                  <i data-lucide="external-link"></i>
                  <div>
                    <span class="meta-label">原始連結</span>
                    <a id="playlist-original-link" href="#" target="_blank" class="meta-val link-anchor">
                      開啟播放清單 <i data-lucide="arrow-up-right" class="inline-icon"></i>
                    </a>
                  </div>
                </div>
              </div>
            </div>
          </aside>

          <!-- Main Content: Videos and Actions -->
          <div class="videos-main-content">
            
            <!-- Filter & Selection Action Toolbar -->
            <div class="toolbar glass-subcard">
              <div class="toolbar-search">
                <i data-lucide="search" class="search-icon"></i>
                <input type="text" id="video-search" placeholder="搜尋影片標題...">
              </div>
              <div class="toolbar-stats">
                已選取 <span id="selected-count">0</span> / <span id="total-count">0</span> 部影片
              </div>
              <div class="selection-controls">
                <button id="btn-select-all" class="text-btn">
                  <i data-lucide="check-square"></i> 全選
                </button>
                <button id="btn-select-none" class="text-btn">
                  <i data-lucide="square"></i> 取消全選
                </button>
              </div>
            </div>

            <!-- Export Formats & Action Panel -->
            <div class="action-panel glass-subcard">
              <div class="panel-header">
                <h3><i data-lucide="copy"></i> 複製與匯出選項</h3>
              </div>
              <div class="format-options">
                <label class="radio-label">
                  <input type="radio" name="export-format" value="link-only" checked>
                  <span class="radio-custom"></span>
                  <span class="format-desc">
                    <strong>僅複製連結</strong>
                    <span>每行一個 YouTube 連結</span>
                  </span>
                </label>
                <label class="radio-label">
                  <input type="radio" name="export-format" value="title-link">
                  <span class="radio-custom"></span>
                  <span class="format-desc">
                    <strong>標題 + 連結</strong>
                    <span>標題與連結分行排列</span>
                  </span>
                </label>
                <label class="radio-label">
                  <input type="radio" name="export-format" value="markdown">
                  <span class="radio-custom"></span>
                  <span class="format-desc">
                    <strong>Markdown 清單</strong>
                    <span>- [標題](連結) 格式</span>
                  </span>
                </label>
                <label class="radio-label">
                  <input type="radio" name="export-format" value="json">
                  <span class="radio-custom"></span>
                  <span class="format-desc">
                    <strong>JSON 格式</strong>
                    <span>結構化的影片資料集</span>
                  </span>
                </label>
              </div>
              <div class="action-buttons-group">
                <button id="btn-copy-selected" class="action-btn glow-btn">
                  <i data-lucide="copy"></i> 複製已選取影片
                </button>
                <button id="btn-download-txt" class="action-btn secondary-btn">
                  <i data-lucide="download"></i> 下載文字檔
                </button>
              </div>
            </div>

            <!-- Videos List Card -->
            <div class="videos-list-card glass-subcard">
              <div class="list-header">
                <h3>影片清單</h3>
                <span class="scroll-tip"><i data-lucide="mouse-pointer"></i> 點擊項目可快速切換選取</span>
              </div>
              <div id="videos-container" class="videos-container">
                <!-- Video items will be dynamically injected here -->
              </div>
            </div>

          </div>

        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="app-footer">
      <p>© 2026 YT Playlist Linker. Designed for high efficiency.</p>
    </footer>
  </div>

  <!-- Toast Notification Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@0.363.0/dist/umd/lucide.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
